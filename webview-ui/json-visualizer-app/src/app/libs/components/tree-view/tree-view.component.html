<div class="tree-view-wrapper">
  <div class="tree-toolbar">
    <button class="toolbar-btn" (click)="expandAll()">
      <i class="pi pi-arrow-up-right-and-arrow-down-left-from-center"></i>
      Expand All
    </button>
    <button class="toolbar-btn" (click)="collapseAll()">
      <i class="pi pi-arrow-down-left-and-arrow-up-right-to-center"></i>
      Collapse All
    </button>
  </div>

  <div class="tree-container">
    <p-tree
      [value]="treeData"
      selectionMode="single"
      (onNodeSelect)="onNodeSelect($event)"
      [scrollHeight]="scrollHeight"
      [virtualScroll]="true"
      [virtualScrollItemSize]="36"
    >
      <ng-template pTemplate="default" let-node>
        <div class="node-content">
          <span class="node-label">{{ node.label }}</span>
          <div class="node-actions">
            <i
              class="pi pi-key"
              pTooltip="Copy Key"
              (click)="copyToClipboard(node.data.key, 'Key', $event)"
            ></i>
            <i
              class="pi pi-copy"
              pTooltip="Copy Value"
              (click)="copyToClipboard(node.data.value, 'Value', $event)"
            ></i>
            <i
              class="pi pi-sitemap"
              pTooltip="Copy JSON Path"
              (click)="copyToClipboard(node.data.path, 'Path', $event)"
            ></i>
          </div>
        </div>
      </ng-template>
    </p-tree>
  </div>

  <footer class="path-footer" *ngIf="selectedNodePath">
    <div class="path-content">
      <span>{{ selectedNodePath }}</span>
      <i
        class="pi pi-copy"
        (click)="copyToClipboard(selectedNodePath, 'Path', $event)"
      ></i>
    </div>
  </footer>
</div>
